<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;
        }

        th, td {
            border: 1px solid darkgray;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabelas</h1>
    <table>
        <caption>
            Filmes Favoritos
        </caption>
        <thead>
            <tr>
                <th>Grupo</th>
                <th>Nomes</th>
                <th colspan="3">Filmes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="3">Mulheres</th>
                <th>Ana</th>
                <th>Alien</th>
                <th>Rambo</th>
                <th>Vingadores</th>
            </tr>
            <tr>
                <th>Beatriz</th>
                <th>Alien</th>
                <th>Dora Aventureira</th>
                <th>Vingadores</th>
            </tr>
            <tr>
                <th>Joana</th>
                <th>Alien</th>
                <th>Homem Aranha</th>
                <th>Vingadores</th>
            </tr>
            <tr>
                <th rowspan="3">Homens</th>
                <th>João</th>
                <th>Alien</th>
                <th>Homem Aranha</th>
                <th>Vingadores</th>
                
               
            </tr>
            <tr>
                <th>Gustavo</th>
                <th>Alien</th>
                <th>Homem Aranha</th>
                <th>Vingadores</th>
            </tr>
            <tr>
                 <th>Lian</th>
                <th>Alien</th>
                <th>Homem Aranha</th>
                <th>Vingadores</th>
            </tr>
        </tbody>
    </table>
</body>
</html>
